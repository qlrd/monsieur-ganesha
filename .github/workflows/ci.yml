name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --dev

      - name: Check formatting (black)
        run: uv run black --check src/ tests/

      - name: Check import order (isort)
        run: uv run isort --check-only src/ tests/

      - name: Lint (pylint)
        run: uv run pylint src/ganesha/

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --dev

      - name: Run test suite
        run: uv run pytest

  forbidden:
    name: Forbidden Functions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --dev

      - name: Copy test config with forbidden functions
        run: cp tests/fixtures/.ganesha.toml .ganesha.toml

      - name: Detect forbidden functions in fixture (must fail)
        run: |
          if uv run ganesha forbidden tests/fixtures/forbidden.c; then
            echo "ERROR: expected ganesha to detect forbidden functions"
            exit 1
          fi
          echo "Forbidden functions detected as expected (exit code 1)."

      - name: Verify clean file passes forbidden check
        run: uv run ganesha forbidden tests/fixtures/valid.c

      - name: Remove temporary config
        if: always()
        run: rm -f .ganesha.toml
